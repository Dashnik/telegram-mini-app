<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Mini App</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #111827;
      --card-border: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #22c55e;
      --primary-disabled: #4b5563;
      --secondary: #2563eb;
      --danger: #ef4444;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 110px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    h1, h2 {
      margin: 0 0 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    h1 {
      font-size: 20px;
    }

    h2 {
      font-size: 17px;
    }

    .timer {
      font-size: clamp(34px, 11vw, 52px);
      font-weight: 800;
      letter-spacing: 1.5px;
      text-align: center;
      margin: 8px 0 14px;
    }

    .row {
      display: grid;
      gap: 10px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    button:disabled {
      background: var(--primary-disabled) !important;
      cursor: not-allowed;
      opacity: 0.75;
    }

    #refreshBtn {
      background: var(--primary);
    }

    #inviteBtn {
      background: var(--secondary);
    }

    .status {
      min-height: 20px;
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
      word-break: break-word;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: #34d399;
    }

    .friends-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    .friends-list li {
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(148, 163, 184, 0.06);
      font-size: 14px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    textarea {
      width: 100%;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(17, 24, 39, 0.55);
      color: var(--text);
      font-size: 15px;
      line-height: 1.35;
      resize: vertical;
      min-height: 84px;
    }

    textarea::placeholder {
      color: rgba(148, 163, 184, 0.8);
    }

    textarea:focus {
      outline: none;
      border-color: rgba(34, 197, 94, 0.65);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
    }

    .message-meta {
      display: flex;
      justify-content: flex-end;
      font-size: 13px;
      color: var(--muted);
      margin-top: -4px;
    }

    #saveMessageBtn {
      background: var(--secondary);
    }

    .tab-panel {
      display: none;
      gap: 14px;
    }

    .tab-panel.active {
      display: grid;
    }

    .tabbar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(480px, 100%);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: rgba(15, 23, 42, 0.92);
      border-top: 1px solid var(--card-border);
      backdrop-filter: blur(14px);
    }

    .tabbar-btn {
      background: rgba(148, 163, 184, 0.14);
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
      padding: 10px 8px;
      border-radius: 12px;
    }

    .tabbar-btn.active {
      background: rgba(34, 197, 94, 0.2);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.45) inset;
    }

    .field-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: -4px;
    }

    select {
      width: 100%;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 12px;
      background: rgba(17, 24, 39, 0.55);
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
      appearance: none;
    }

    select:focus {
      outline: none;
      border-color: rgba(34, 197, 94, 0.65);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="panelTimer" class="tab-panel active" data-panel="timer">
      <section class="card">
        <h1>Alive Timer</h1>
        <div id="timerDisplay" class="timer">00:00:00</div>
        <div class="row">
          <button id="refreshBtn" type="button">Refresh Timer</button>
          <button id="inviteBtn" type="button">Invite Friends</button>
        </div>
        <div class="row">
          <div class="muted">Optional message for friends (max 140 characters)</div>
          <textarea
            id="additionalMessage"
            maxlength="140"
            rows="3"
            placeholder="Add a short note to be appended when you go inactive..."
          ></textarea>
          <div class="message-meta">
            <span id="additionalMessageCount">0/140</span>
          </div>
          <button id="saveMessageBtn" type="button">Save Message</button>
        </div>
        <div id="globalStatus" class="status"></div>
      </section>
    </div>

    <div id="panelFriends" class="tab-panel" data-panel="friends">
      <section class="card">
        <h2>Friends</h2>
        <div id="friendsEmpty" class="muted">Loading friends...</div>
        <ul id="friendsList" class="friends-list"></ul>
      </section>
    </div>

    <div id="panelSettings" class="tab-panel" data-panel="settings">
      <section class="card">
        <h2>Settings</h2>
        <div class="row">
          <div class="field-label">Check-in frequency</div>
          <select id="checkInFrequencySelect" disabled>
            <option value="5">5 minutes</option>
            <option value="1440">1 day</option>
            <option value="2880" selected>2 days</option>
            <option value="4320">3 days</option>
          </select>
          <div id="settingsStatus" class="status"></div>
        </div>
      </section>
    </div>
  </main>

  <nav class="tabbar" aria-label="Tabs">
    <button class="tabbar-btn active" type="button" data-tab="timer">Timer</button>
    <button class="tabbar-btn" type="button" data-tab="friends">Friends</button>
    <button class="tabbar-btn" type="button" data-tab="settings">Settings</button>
  </nav>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function () {
      "use strict";

      const API_URL = "https://nonsanctimoniously-increasable-shella.ngrok-free.dev/"; // https://YOUR_NGROK_URL
      const ENDPOINTS = {
        login: "/auth/login",
        timerRefresh: "/timer/refresh",
        timerMessage: "/timer/message",
        inviteLink: "/invite/link",
        friendsList: "/friends/list",
        settingsGet: "/settings",
        settingsCheckinFrequency: "/settings/checkin-frequency"
      };

      const state = {
        tg: null,
        initData: "",
        timerExpiresAtMs: 0,
        timerIntervalId: null,
        checkInFrequencyMinutes: 2880,
        activeTab: "timer",
        inFlight: {
          refresh: false,
          invite: false,
          message: false,
          settings: false
        }
      };

      const ui = {
        panelTimer: document.getElementById("panelTimer"),
        panelFriends: document.getElementById("panelFriends"),
        panelSettings: document.getElementById("panelSettings"),
        tabButtons: Array.from(document.querySelectorAll(".tabbar-btn")),
        timerDisplay: document.getElementById("timerDisplay"),
        refreshBtn: document.getElementById("refreshBtn"),
        inviteBtn: document.getElementById("inviteBtn"),
        additionalMessage: document.getElementById("additionalMessage"),
        additionalMessageCount: document.getElementById("additionalMessageCount"),
        saveMessageBtn: document.getElementById("saveMessageBtn"),
        globalStatus: document.getElementById("globalStatus"),
        friendsList: document.getElementById("friendsList"),
        friendsEmpty: document.getElementById("friendsEmpty"),
        checkInFrequencySelect: document.getElementById("checkInFrequencySelect"),
        settingsStatus: document.getElementById("settingsStatus")
      };

      function setStatus(message, type) {
        ui.globalStatus.textContent = message || "";
        ui.globalStatus.className = "status";
        if (type === "error") ui.globalStatus.classList.add("error");
        if (type === "success") ui.globalStatus.classList.add("success");
      }

      function setSettingsStatus(message, type) {
        ui.settingsStatus.textContent = message || "";
        ui.settingsStatus.className = "status";
        if (type === "error") ui.settingsStatus.classList.add("error");
        if (type === "success") ui.settingsStatus.classList.add("success");
      }

      function setActiveTab(tab) {
        state.activeTab = tab;
        const panels = [
          { key: "timer", el: ui.panelTimer },
          { key: "friends", el: ui.panelFriends },
          { key: "settings", el: ui.panelSettings }
        ];
        for (const p of panels) {
          if (!p.el) continue;
          p.el.classList.toggle("active", p.key === tab);
        }
        for (const btn of ui.tabButtons) {
          btn.classList.toggle("active", btn.dataset.tab === tab);
        }
      }

      function setButtonLoading(button, loading, textWhenLoading, textWhenIdle) {
        button.disabled = loading;
        button.textContent = loading ? textWhenLoading : textWhenIdle;
      }

      function normalizeAdditionalMessage(value) {
        const raw = typeof value === "string" ? value : "";
        return raw.slice(0, 140);
      }

      function renderAdditionalMessageCount() {
        const clamped = normalizeAdditionalMessage(ui.additionalMessage.value);
        if (ui.additionalMessage.value !== clamped) ui.additionalMessage.value = clamped;
        ui.additionalMessageCount.textContent = `${clamped.length}/140`;
      }

      function formatDuration(totalSeconds) {
        const safeSeconds = Math.max(0, totalSeconds);
        const hours = Math.floor(safeSeconds / 3600);
        const minutes = Math.floor((safeSeconds % 3600) / 60);
        const seconds = Math.floor(safeSeconds % 60);
        return [hours, minutes, seconds].map((value) => String(value).padStart(2, "0")).join(":");
      }

      function renderTimer() {
        if (!state.timerExpiresAtMs) {
          ui.timerDisplay.textContent = "00:00:00";
          return;
        }
        const nowMs = Date.now();
        const remainingMs = state.timerExpiresAtMs - nowMs;
        const remainingSeconds = Math.floor(remainingMs / 1000);
        ui.timerDisplay.textContent = formatDuration(remainingSeconds);
      }

      function startTimerTicking() {
        if (state.timerIntervalId) {
          clearInterval(state.timerIntervalId);
        }
        renderTimer();
        state.timerIntervalId = window.setInterval(renderTimer, 1000);
      }

      function parseExpiresAt(payload) {
        if (!payload || typeof payload !== "object") return 0;
        const candidates = [
          payload.timerExpiresAt,
          payload.expiresAt,
          payload.user && payload.user.timerExpiresAt,
          payload.data && payload.data.timerExpiresAt,
          payload.data && payload.data.expiresAt
        ];
        for (const rawValue of candidates) {
          if (rawValue === null || rawValue === undefined || rawValue === "") continue;

          if (typeof rawValue === "number" && Number.isFinite(rawValue)) {
            return rawValue > 1e12 ? rawValue : rawValue * 1000;
          }

          if (typeof rawValue === "string" && /^[0-9]+$/.test(rawValue)) {
            const asNumber = Number(rawValue);
            if (Number.isFinite(asNumber)) {
              return asNumber > 1e12 ? asNumber : asNumber * 1000;
            }
          }

          const timestamp = Date.parse(rawValue);
          if (!Number.isNaN(timestamp)) return timestamp;
        }
        return 0;
      }

   function getReferralFromUrl() {
  const tg = window.Telegram?.WebApp;

  // Telegram referral parameter (when opened via bot)
  const telegramRef = tg?.initDataUnsafe?.start_param;
  if (telegramRef) {
    return telegramRef.trim();
  }

  // Fallback for browser testing
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");

  return ref ? ref.trim() : "";
}

      async function apiRequest(path, options) {
        const url = API_URL.replace(/\/+$/, "") + path;
        const response = await fetch(url, {
          method: options.method || "GET",
          headers: {
  "Content-Type": "application/json",
  "Authorization": "tma " + state.initData,
  "ngrok-skip-browser-warning": "true"
},
          body: options.body ? JSON.stringify(options.body) : undefined
        });

        const rawText = await response.text();
        let data = null;
        if (rawText) {
          try {
            data = JSON.parse(rawText);
          } catch (error) {
            data = { raw: rawText };
          }
        }

        if (!response.ok) {
          const messageFromApi =
            data && typeof data === "object" && (data.message || data.error || data.detail);
          throw new Error(messageFromApi || ("Request failed: " + response.status));
        }

        return data;
      }

      function toAllowedCheckInMinutes(rawValue) {
        const allowed = new Set([5, 1440, 2880, 4320]);
        const asNumber =
          typeof rawValue === "number" && Number.isFinite(rawValue)
            ? rawValue
            : typeof rawValue === "string" && rawValue.trim() !== "" && /^[0-9]+$/.test(rawValue.trim())
              ? Number(rawValue.trim())
              : NaN;
        if (Number.isInteger(asNumber) && allowed.has(asNumber)) return asNumber;
        return 2880;
      }

      async function loadSettings() {
        setSettingsStatus("");
        try {
          const data = await apiRequest(ENDPOINTS.settingsGet, { method: "GET" });
          const minutes = toAllowedCheckInMinutes(data && (
            data.checkInFrequencyMinutes ||
            (data.data && data.data.checkInFrequencyMinutes)
          ));
          state.checkInFrequencyMinutes = minutes;
          ui.checkInFrequencySelect.value = String(minutes);

          const expiresAtMs = parseExpiresAt(data);
          if (expiresAtMs) {
            state.timerExpiresAtMs = expiresAtMs;
            renderTimer();
          }
        } catch (error) {
          setSettingsStatus(error.message || "Failed to load settings.", "error");
        }
      }

      function renderFriends(items) {
        ui.friendsList.innerHTML = "";
        if (!Array.isArray(items) || items.length === 0) {
          ui.friendsEmpty.style.display = "block";
          ui.friendsEmpty.textContent = "No friends invited yet.";
          return;
        }

        ui.friendsEmpty.style.display = "none";
        for (const friend of items) {
          const li = document.createElement("li");
          const label = (friend && (friend.firstName || friend.username)) || "Unknown user";
          li.textContent = label;
          ui.friendsList.appendChild(li);
        }
      }

      async function loadFriends() {
        try {
          const data = await apiRequest(ENDPOINTS.friendsList, { method: "GET" });
          const list = Array.isArray(data)
            ? data
            : (data && (data.friends || data.items || data.data || []));
          renderFriends(list);
        } catch (error) {
          ui.friendsEmpty.style.display = "block";
          ui.friendsEmpty.textContent = "Failed to load friends.";
          setStatus(error.message || "Could not load friends list.", "error");
        }
      }

      async function handleCheckInFrequencyChange() {
        if (state.inFlight.settings) return;
        state.inFlight.settings = true;

        const minutes = toAllowedCheckInMinutes(ui.checkInFrequencySelect.value);
        ui.checkInFrequencySelect.disabled = true;
        setSettingsStatus("Saving...");

        try {
          const data = await apiRequest(ENDPOINTS.settingsCheckinFrequency, {
            method: "POST",
            body: { checkInFrequencyMinutes: minutes }
          });

          state.checkInFrequencyMinutes = minutes;
          const expiresAtMs = parseExpiresAt(data);
          if (expiresAtMs) {
            state.timerExpiresAtMs = expiresAtMs;
            renderTimer();
          }
          setSettingsStatus("Saved.", "success");
        } catch (error) {
          ui.checkInFrequencySelect.value = String(state.checkInFrequencyMinutes || 2880);
          setSettingsStatus(error.message || "Failed to save setting.", "error");
        } finally {
          state.inFlight.settings = false;
          ui.checkInFrequencySelect.disabled = false;
        }
      }

      async function handleRefreshClick() {
        if (state.inFlight.refresh) return;
        state.inFlight.refresh = true;
        setButtonLoading(ui.refreshBtn, true, "Refreshing...", "Refresh Timer");
        setStatus("Refreshing timer...");

        try {
          const data = await apiRequest(ENDPOINTS.timerRefresh, { method: "POST" });
          const nextExpiresMs = parseExpiresAt(data);
          if (!nextExpiresMs) {
            throw new Error("Timer refresh succeeded but expiration time was not provided.");
          }
          state.timerExpiresAtMs = nextExpiresMs;
          renderTimer();
          setStatus("Timer refreshed successfully.", "success");
        } catch (error) {
          setStatus(error.message || "Failed to refresh timer.", "error");
        } finally {
          state.inFlight.refresh = false;
          setButtonLoading(ui.refreshBtn, false, "Refreshing...", "Refresh Timer");
        }
      }

      async function copyInviteLink(link) {
        if (!navigator.clipboard || !navigator.clipboard.writeText) {
          throw new Error("Clipboard API is unavailable in this environment.");
        }
        await navigator.clipboard.writeText(link);
      }

      async function handleInviteClick() {
        if (state.inFlight.invite) return;
        state.inFlight.invite = true;
        setButtonLoading(ui.inviteBtn, true, "Preparing...", "Invite Friends");
        setStatus("Requesting invite link...");

        try {
          const data = await apiRequest(ENDPOINTS.inviteLink, { method: "GET" });
          const link = (data && (
            data.inviteLink ||
            data.link ||
            data.url ||
            (data.data && data.data.inviteLink) ||
            (data.data && data.data.link) ||
            (data.data && data.data.url)
          )) || "";
          if (!link || typeof link !== "string") {
            throw new Error("Invite link not found in response.");
          }
          await copyInviteLink(link);
          setStatus("Invite link copied to clipboard.", "success");
        } catch (error) {
          setStatus(error.message || "Failed to copy invite link.", "error");
        } finally {
          state.inFlight.invite = false;
          setButtonLoading(ui.inviteBtn, false, "Preparing...", "Invite Friends");
        }
      }

      async function handleSaveMessageClick() {
        if (state.inFlight.message) return;
        state.inFlight.message = true;
        setButtonLoading(ui.saveMessageBtn, true, "Saving...", "Save Message");
        setStatus("Saving message...");

        const message = normalizeAdditionalMessage(ui.additionalMessage.value).trim();
        renderAdditionalMessageCount();

        try {
          await apiRequest(ENDPOINTS.timerMessage, {
            method: "POST",
            body: { additionalMessage: message }
          });
          setStatus(message ? "Message saved." : "Message cleared.", "success");
        } catch (error) {
          setStatus(error.message || "Failed to save message.", "error");
        } finally {
          state.inFlight.message = false;
          setButtonLoading(ui.saveMessageBtn, false, "Saving...", "Save Message");
        }
      }

      async function authenticateAndBootstrap() {
        setStatus("Loading...");
        ui.friendsEmpty.textContent = "Loading friends...";
        ui.refreshBtn.disabled = true;
        ui.inviteBtn.disabled = true;
        ui.additionalMessage.disabled = true;
        ui.saveMessageBtn.disabled = true;
        ui.checkInFrequencySelect.disabled = true;
        setSettingsStatus("");
        renderAdditionalMessageCount();

        const tg = window.Telegram && window.Telegram.WebApp;
        if (!tg) {
          setStatus("This app must be opened inside Telegram.", "error");
          ui.friendsEmpty.textContent = "Unavailable outside Telegram.";
          return;
        }

        tg.ready();
        tg.expand();
        state.tg = tg;
        state.initData = tg.initData || "";

        if (!state.initData) {
          setStatus("Missing Telegram initData. Open this app via Telegram.", "error");
          ui.friendsEmpty.textContent = "Authorization failed.";
          return;
        }

        const ref = getReferralFromUrl();

        try {
          const loginData = await apiRequest(ENDPOINTS.login, {
            method: "POST",
            body: ref ? { referralCode: ref } : undefined
          });
          const expiresAtMs = parseExpiresAt(loginData);
          if (!expiresAtMs) {
            throw new Error("Login succeeded but timer expiration was not returned.");
          }

          state.timerExpiresAtMs = expiresAtMs;
          startTimerTicking();
          await loadFriends();
          await loadSettings();

          ui.refreshBtn.disabled = false;
          ui.inviteBtn.disabled = false;
          ui.additionalMessage.disabled = false;
          ui.saveMessageBtn.disabled = false;
          ui.checkInFrequencySelect.disabled = false;

          if (API_URL.includes("YOUR_NGROK_URL")) {
            setStatus("Set API_URL to your backend URL before production use.", "error");
          } else {
            setStatus("Ready.", "success");
          }
        } catch (error) {
          setStatus(error.message || "Authentication failed.", "error");
          ui.friendsEmpty.textContent = "Could not load data.";
          ui.refreshBtn.disabled = true;
          ui.inviteBtn.disabled = true;
          ui.additionalMessage.disabled = true;
          ui.saveMessageBtn.disabled = true;
        }
      }

      ui.refreshBtn.addEventListener("click", handleRefreshClick);
      ui.inviteBtn.addEventListener("click", handleInviteClick);
      ui.additionalMessage.addEventListener("input", renderAdditionalMessageCount);
      ui.saveMessageBtn.addEventListener("click", handleSaveMessageClick);
      ui.checkInFrequencySelect.addEventListener("change", handleCheckInFrequencyChange);
      for (const btn of ui.tabButtons) {
        btn.addEventListener("click", () => setActiveTab(btn.dataset.tab || "timer"));
      }

      authenticateAndBootstrap();
    })();
  </script>
</body>
</html>
